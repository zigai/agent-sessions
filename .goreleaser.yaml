version: 2
project_name: agent-sessions

before:
  hooks:
    - go mod tidy

builds:
  - main: ./main.go
    binary: agent-sessions
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/zigai/agent-sessions/internal/cli.version={{.Version}}
      - -X github.com/zigai/agent-sessions/internal/cli.commit={{.ShortCommit}}
      - -X github.com/zigai/agent-sessions/internal/cli.date={{.Date}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:

      - LICENSE

      - README.md

nfpms:
  - id: agent-sessions
    package_name: agent-sessions
    vendor: zigai
    homepage: https://github.com/zigai/agent-sessions
    maintainer: zigai
    description: A Go CLI project
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: desc
  abbrev: 7
  format: '[`{{ printf "%.7s" .SHA }}`](https://github.com/zigai/agent-sessions/commit/{{ .SHA }}) {{ .Message }}'
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - '^docs(\([^)]+\))?!?:'
      - '^test(\([^)]+\))?!?:'
      - '^ci(\([^)]+\))?!?:'
      - '^chore(\([^)]+\))?!?:'

release:
  github:
    owner: zigai
    name: agent-sessions
  draft: false
  prerelease: auto
