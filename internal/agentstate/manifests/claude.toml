version = 1
agent = "claude"

[[rules]]
id = "permission_prompt"
state = "waiting"
priority = 300
region = "bottom:30"
any = ["Do you want to proceed?", "Allow this action?", "Yes, and don't ask again", "Esc to cancel"]

[[rules]]
id = "question_prompt"
state = "waiting"
priority = 250
region = "bottom:30"
any = ["Claude has a question", "How should Claude proceed?", "Select an option"]

[[rules]]
id = "working_interruptible"
state = "running"
priority = 200
region = "bottom:20"
any = ["esc to interrupt", "ctrl+c to interrupt"]

[[rules]]
id = "input_prompt"
state = "idle"
priority = 100
region = "bottom:12"
all = ["❯"]
any = ["? for shortcuts", "Claude Code", "shift+tab to cycle"]
none = ["esc to interrupt"]
