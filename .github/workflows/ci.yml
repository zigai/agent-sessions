name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependency metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install --yes tmux

      - name: Run integration tests
        run: go test -tags=integration ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test-darwin:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...
